<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMBIAN Анализатор</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* БЛОКИРУЕМ ПРОКРУТКУ ВСЕГО ЭКРАНА СМАРТФОНА */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Запрещаем скролл на уровне страницы */
            width: 100%;
            position: fixed; /* Фиксируем body, чтобы он не прыгал */
            -webkit-overflow-scrolling: touch;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Центрируем контент */
            padding: 16px;
            box-sizing: border-box;
        }

        .app-container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 20px;
            box-sizing: border-box;
        }

        h1 { font-size: 18px; text-align: center; color: #007aff; margin-top: 0; }
        p { font-size: 13px; color: #666; text-align: center; line-height: 1.4; margin-bottom: 15px; }

        .upload-zone {
            border: 2px dashed #007aff;
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            background-color: #f0f7ff;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .preview-container {
            display: none;
            position: relative;
            width: 100%;
            max-width: 200px;
            margin: 0 auto 15px auto;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            /* ВАЖНО: ЗАПРЕЩАЕМ ЛЮБЫЕ ЖЕСТЫ БРАУЗЕРА В ЭТОЙ ЗОНЕ */
            touch-action: none; 
        }

        #test-image { width: 100%; display: block; pointer-events: none; }

        .guide-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 6px; /* Чуть толще для удобства пальца */
            cursor: ns-resize;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            /* ВАЖНО: ЗАПРЕЩАЕМ ЛЮБЫЕ ЖЕСТЫ НА ЛИНИИ */
            touch-action: none;
        }

        .guide-line::after {
            content: attr(data-label);
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 4px;
            margin-right: 5px;
            pointer-events: none;
        }

        #line-c { top: 25%; background-color: #ff3b30; }
        #line-r { top: 50%; background-color: #ffcc00; }
        #line-t { top: 75%; background-color: #34c759; }

        .btn {
            display: block;
            width: 100%;
            background-color: #007aff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🧪 ИМБИАН Анализ</h1>
    <p>Загрузите фото теста и совместителинии с полосками.</p>

    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <span style="font-size: 24px;">📸</span>
        <div style="margin-top: 5px; font-weight: 500; font-size: 14px;">Выбрать фото</div>
    </div>
    <input type="file" id="file-input" accept="image/*">

    <div class="preview-container" id="preview-box">
        <img id="test-image" src="" alt="Тест">
        <div class="guide-line" id="line-c" data-label="C"></div>
        <div class="guide-line" id="line-r" data-label="R"></div>
        <div class="guide-line" id="line-t" data-label="T"></div>
    </div>

    <button class="btn" onclick="analyzeResult()">Узнать результат</button>
</div>

<script>
    // Инициализация Telegram Mini App
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand(); // Разворачиваем на весь экран сразу
    }

    const fileInput = document.getElementById('file-input');
    const previewBox = document.getElementById('preview-box');
    const testImage = document.getElementById('test-image');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                testImage.src = event.target.result;
                previewBox.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    function makeDraggable(element) {
        let isDragging = false;
        let startY = 0;
        let startTop = 0;

        // Обработка мыши
        element.addEventListener('mousedown', (e) => {
            isDragging = true;
            startY = e.clientY;
            startTop = parseFloat(element.style.top) || 0;
            e.preventDefault();
        });

        // Обработка касания (Finger)
        element.addEventListener('touchstart', (e) => {
            isDragging = true;
            startY = e.touches[0].clientY;
            startTop = parseFloat(element.style.top) || 0;
            // ЖЕСТКО БЛОКИРУЕМ СТАНДАРТНЫЙ ЖЕСТ БРАУЗЕРА
            if(e.cancelable) e.preventDefault(); 
        }, { passive: false });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            moveLine(e.clientY);
        });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            // ЕЩЕ ОДНА ЖЕСТКАЯ БЛОКИРОВКА СДВИГА ЭКРАНА
            if(e.cancelable) e.preventDefault(); 
            moveLine(e.touches[0].clientY);
        }, { passive: false });

        function moveLine(clientY) {
            const rect = previewBox.getBoundingClientRect();
            let y = clientY - rect.top;
            if (y >= 0 && y <= rect.height) {
                element.style.top = (y / rect.height * 100) + '%';
            }
        }

        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchcancel', () => isDragging = false);
    }

    makeDraggable(document.getElementById('line-c'));
    makeDraggable(document.getElementById('line-r'));
    makeDraggable(document.getElementById('line-t'));

    function analyzeResult() {
        const posC = parseFloat(document.getElementById('line-c').style.top) || 25;
        const posR = parseFloat(document.getElementById('line-r').style.top) || 50;
        const posT = parseFloat(document.getElementById('line-t').style.top) || 75;

        const dataToSend = {
            line_c: posC.toFixed(1),
            line_r: posR.toFixed(1),
            line_t: posT.toFixed(1)
        };

        if (window.Telegram && window.Telegram.WebApp) {
            // Отправляем данные и ЗАКРЫВАЕМ приложение
            window.Telegram.WebApp.sendData(JSON.stringify(dataToSend));
            setTimeout(() => { window.Telegram.WebApp.close(); }, 100);
        } else {
            alert("Тест вне Telegram. Данные: " + JSON.stringify(dataToSend));
        }
    }
</script>

</body>
</html>
