<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMBIAN Анализатор</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb;
            margin: 0;
            padding: 16px;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 20px;
            text-align: center;
            color: #007aff;
            margin-top: 0;
        }
        p {
            font-size: 14px;
            color: #666;
            text-align: center;
            line-height: 1.4;
        }
        .upload-zone {
            border: 2px dashed #007aff;
            border-radius: 12px;
            padding: 30px 10px;
            text-align: center;
            background-color: #f0f7ff;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .upload-zone:hover {
            background-color: #e1f0ff;
        }
        .preview-container {
            display: none;
            position: relative;
            width: 100%;
            max-width: 200px;
            margin: 0 auto 20px auto;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
        }
        #test-image {
            width: 100%;
            display: block;
        }
        /* Стили для калибровочных линий */
        .guide-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 4px;
            cursor: ns-resize;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        .guide-line::after {
            content: attr(data-label);
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 5px;
            pointer-events: none;
        }
        #line-c { top: 25%; background-color: #ff3b30; }
        #line-r { top: 50%; background-color: #ffcc00; }
        #line-t { top: 75%; background-color: #34c759; }

        .btn {
            display: block;
            width: 100%;
            background-color: #007aff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,122,255,0.2);
        }
        .btn:hover { background-color: #0063cc; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🧪 IMBIAN «Ферритин-ИХА»</h1>
    <p>Загрузите фото окошка теста и совместите цветные линии с полосками на кассете для сверхточного анализа.</p>

    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <span style="font-size: 30px;">📸</span>
        <div style="margin-top: 8px; font-weight: 500;">Выбрать фото теста</div>
    </div>
    <input type="file" id="file-input" accept="image/*">

    <div class="preview-container" id="preview-box">
        <img id="test-image" src="" alt="Тест">
        <div class="guide-line" id="line-c" data-label="Линия C (Контроль)"></div>
        <div class="guide-line" id="line-r" data-label="Линия R (Референс)"></div>
        <div class="guide-line" id="line-t" data-label="Линия T (Тест)"></div>
    </div>

    <button class="btn" onclick="analyzeResult()">Узнать результат</button>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const previewBox = document.getElementById('preview-box');
    const testImage = document.getElementById('test-image');

    // Логика отображения загруженного фото
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                testImage.src = event.target.result;
                previewBox.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    // Делаем линии перетаскиваемыми мышкой или пальцем
    function makeDraggable(element) {
        let isDragging = false;

        element.addEventListener('mousedown', (e) => { isDragging = true; e.preventDefault(); });
        element.addEventListener('touchstart', (e) => { isDragging = true; });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const rect = previewBox.getBoundingClientRect();
            let y = e.clientY - rect.top;
            if (y >= 0 && y <= rect.height) {
                element.style.top = (y / rect.height * 100) + '%';
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const rect = previewBox.getBoundingClientRect();
            let y = e.touches[0].clientY - rect.top;
            if (y >= 0 && y <= rect.height) {
                element.style.top = (y / rect.height * 100) + '%';
            }
        });

        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);
    }

    makeDraggable(document.getElementById('line-c'));
    makeDraggable(document.getElementById('line-r'));
    makeDraggable(document.getElementById('line-t'));

    
    function analyzeResult() {
        const rect = previewBox.getBoundingClientRect();
        
        // Считаем, на каком проценте высоты от верха картинки находятся линии C, R и T
        const posC = parseFloat(document.getElementById('line-c').style.top) || 25;
        const posR = parseFloat(document.getElementById('line-r').style.top) || 50;
        const posT = parseFloat(document.getElementById('line-t').style.top) || 75;

        alert(
            "Координаты зафиксированы! 🎯\n\n" +
            "Линия C: " + posC.toFixed(1) + "%\n" +
            "Линия R: " + posR.toFixed(1) + "%\n" +
            "Линия T: " + posT.toFixed(1) + "%\n\n" +
            "На следующем шаге эти цифры улетят в Telegram Telegram WebApps API!"
        );
    }
</script>

</body>
</html>
